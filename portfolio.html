<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Onyc.meme</title>
    <link rel="icon" type="image/png" href="/onyc-icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/ethereum-blockies@0.1.1/blockies.js"></script>
</head>
<body>
    <div class="overlay-gradient" style="height: 30vh; opacity: 0.5;"></div>
    <header class="navbar">
        <div class="logo-container">
            <img class="logo-icon" src="/onyc-icon.png" alt="Onyc.meme logo">
            <a href="index.html" class="logo-text" style="text-decoration: none;">Onyc.meme</a>
        </div>
        
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <nav class="nav-links">
            <a href="launch.html" class="nav-link">Launch Meme</a>
            <a href="markets.html" class="nav-link">Markets</a>
            <a href="leaderboard.html" class="nav-link">Leaderboard</a>
            <a href="portfolio.html" class="nav-link active">Portfolio</a>
        </nav>
        
        <button id="custom-wallet-btn" class="connect-btn">Connect Wallet</button>
    </header>

    <main class="markets-container">
        <!-- Profile Header Card -->
        <div class="profile-header-card" style="display: none;" id="profile-area">
            <div class="profile-avatar-container">
                <img id="pfp-img" src="" alt="Avatar" class="profile-avatar">
            </div>
            
            <div class="profile-info-container">
                <div class="profile-address-row">
                    <h2 class="profile-address" id="profile-address-display">0x...</h2>
                    <div class="copy-address-pill" id="copy-address-btn" title="Copy Address">
                        <span id="copy-address-text">0x...</span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="profile-stats-container">
                <div class="profile-stat-box">
                    <span class="stat-value-large" id="stat-tokens-held">0</span>
                    <span class="stat-label-small">Tokens</span>
                </div>
                <div class="profile-stat-box">
                    <span class="stat-value-large" id="stat-tokens-launched">0</span>
                    <span class="stat-label-small">Launched</span>
                </div>
            </div>
        </div>

        <div id="portfolio-status" style="text-align: center; padding: 60px; margin-top: 40px; background: rgba(26, 26, 46, 0.6); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05);">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" style="margin-bottom: 20px;">
                <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5"></path>
                <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path>
            </svg>
            <h3 style="color: white; margin-bottom: 10px; font-weight: 500;">Wallet Disconnected</h3>
            <p style="opacity: 0.7; margin-bottom: 20px; font-size: 0.9rem;">Please connect your wallet to view your portfolio.</p>
            <button class="primary-btn connect-wallet-trigger" style="margin: 0 auto;">Connect Wallet</button>
        </div>

        <!-- Navigation Tabs -->
        <div class="portfolio-tabs" id="portfolio-tabs-container" style="display: none;">
            <button class="portfolio-tab active" id="tab-portfolio">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5"></path>
                    <path d="M18 12a2 2 0 0 0 0 4h4v-4Z"></path>
                </svg>
                My Portfolio
            </button>
            <button class="portfolio-tab" id="tab-launched">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                </svg>
                Launched
            </button>
        </div>

        <div class="tokens-grid" id="portfolio-grid">
            <!-- Tokens will be injected here -->
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
