<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedera.Meme - Meme Market</title>
    <meta name="description"
        content="The premier decentralized marketplace for meme tokens. Trade viral moments on Hedera Testnet.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="overlay-gradient"></div>
    <header class="navbar">
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11 2L12.5 8.5L19 10L12.5 11.5L11 18L9.5 11.5L3 10L9.5 8.5L11 2Z" fill="#FFD700"
                    stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="18" cy="18" r="2" fill="#FFD700" />
                <circle cx="6" cy="19" r="1.5" fill="#FFD700" />
            </svg>
            <span class="logo-text">Hedera.Meme</span>
        </div>

        <nav class="nav-links">
            <a href="launch.html" class="nav-link">Launch Meme</a>
            <a href="markets.html" class="nav-link">Markets</a>
            <a href="leaderboard.html" class="nav-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="nav-icon">
                    <path
                        d="M8 21H16M12 17V21M7 4H17M7 4C7 8.418 8.418 12 12 12M17 4C17 8.418 15.582 12 12 12M7 4H5C3.895 4 3 4.895 3 6C3 8.209 4.791 10 7 10H7C8.418 10 10 8.418 10 6M17 4H19C20.105 4 21 4.895 21 6C21 8.209 19.209 10 17 10H17C15.582 10 14 8.418 14 6"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                Leaderboard
            </a>
            <a href="portfolio.html" class="nav-link">Portfolio</a>
        </nav>

        <button id="custom-wallet-btn" class="connect-btn">Connect Wallet</button>
    </header>

    <main class="hero-section">
        <div class="network-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2">
                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" />
            </svg>
            Live on Hedera Testnet
        </div>

        <h1 class="hero-title">
            Trade the Culture.<br>
            <span class="highlight">Own the Moment.</span>
        </h1>

        <p class="hero-subtitle">
            The premier decentralized marketplace for meme tokens. Trade viral<br>
            moments, back emerging creators, and ride the wave of internet culture.
        </p>

        <div class="hero-actions">
            <button class="primary-btn">Start Trading <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" />
                </svg></button>
            <button class="secondary-btn">Launch a Meme</button>
        </div>
    </main>



    <script type="module" src="script.js"></script>
</body>

</html>
