<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markets - Onyc.meme</title>
    <link rel="icon" type="image/png" href="/onyc-icon.png">
    <meta name="description" content="Discover the most viral meme tokens on Hedera Testnet.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay-gradient" style="height: 30vh; opacity: 0.5;"></div>
    <header class="navbar">
        <div class="logo-container">
            <img class="logo-icon" src="/onyc-icon.png" alt="Onyc.meme logo">
            <a href="index.html" class="logo-text" style="text-decoration: none;">Onyc.meme</a>
        </div>
        
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <nav class="nav-links">
            <a href="launch.html" class="nav-link">Launch Meme</a>
            <a href="markets.html" class="nav-link active">Markets</a>
            <a href="leaderboard.html" class="nav-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="nav-icon"><path d="M8 21H16M12 17V21M7 4H17M7 4C7 8.418 8.418 12 12 12M17 4C17 8.418 15.582 12 12 12M7 4H5C3.895 4 3 4.895 3 6C3 8.209 4.791 10 7 10H7C8.418 10 10 8.418 10 6M17 4H19C20.105 4 21 4.895 21 6C21 8.209 19.209 10 17 10H17C15.582 10 14 8.418 14 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Leaderboard
            </a>
            <a href="portfolio.html" class="nav-link">Portfolio</a>
        </nav>
        
        <button id="custom-wallet-btn" class="connect-btn">Connect Wallet</button>
    </header>

    <main class="markets-container">
        <div class="markets-header">
            <div class="markets-title-area">
                <h1 class="markets-title">Hot Memes</h1>
                <p class="markets-subtitle">Discover the most viral tokens</p>
            </div>
            <div class="markets-search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="markets-search" placeholder="Search by name or symbol...">
            </div>
            <div class="markets-filters">
                <button class="filter-btn active" data-sort="trending">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19C19.5 17 21 14.5 21 12C21 7 16 3 12 3C8 3 3 7 3 12C3 14.5 4.5 17 6.5 19"/><path d="M12 21V15M12 15L9 18M12 15L15 18"/></svg>
                    Trending
                </button>
                <button class="filter-btn" data-sort="new">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    New
                </button>
                <button class="filter-btn" data-sort="gainers">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
                    Gainers
                </button>
                <button class="filter-btn" data-sort="volume">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                    Volume
                </button>
                <button class="filter-btn" id="markets-watchlist-filter" data-sort="watchlist">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    Watchlist
                </button>
            </div>
        </div>

        <div class="tokens-grid" id="tokens-grid">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; opacity: 0.7;">Loading markets...</div>
        </div>

        <div style="text-align: center; margin-top: 24px;">
            <button id="markets-load-more" class="filter-btn" style="display: none;">Load More</button>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
