<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Onyc.meme</title>
    <link rel="icon" type="image/png" href="/onyc-icon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay-gradient"></div>
    <header class="navbar">
        <div class="logo-container">
            <img class="logo-icon" src="/onyc-icon.png" alt="Onyc.meme logo">
            <span class="logo-text">Onyc.meme</span>
        </div>
        
        <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <nav class="nav-links">
            <a href="launch.html" class="nav-link">Launch Meme</a>
            <a href="markets.html" class="nav-link">Markets</a>
            <a href="leaderboard.html" class="nav-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="nav-icon"><path d="M8 21H16M12 17V21M7 4H17M7 4C7 8.418 8.418 12 12 12M17 4C17 8.418 15.582 12 12 12M7 4H5C3.895 4 3 4.895 3 6C3 8.209 4.791 10 7 10H7C8.418 10 10 8.418 10 6M17 4H19C20.105 4 21 4.895 21 6C21 8.209 19.209 10 17 10H17C15.582 10 14 8.418 14 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Leaderboard
            </a>
            <a href="portfolio.html" class="nav-link">Portfolio</a>
        </nav>
        
        <button id="custom-wallet-btn" class="connect-btn">Connect Wallet</button>
    </header>

    <main class="leaderboard-container">
        <div class="leaderboard-header">
            <div class="leaderboard-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5z"/><path d="M5 20h14"/></svg> Leaderboards
            </div>
            <h1 class="leaderboard-title">Hall of Fame</h1>
            <p class="leaderboard-subtitle">Top performers and trending memes this week</p>
        </div>

        <div class="leaderboard-grid">
            <!-- Left Column: Top Creators -->
            <div class="leaderboard-column">
                <div class="column-header">
                    <h3>👑 Top Creators</h3>
                </div>
                <div class="list-container" id="top-creators-list">
                    <!-- Dynamic content will be injected here -->
                    <div style="text-align: center; padding: 40px; opacity: 0.6;">Loading creators...</div>
                </div>
            </div>

            <!-- Right Column: Top Memes (By Volume) -->
            <div class="leaderboard-column">
                <div class="column-header">
                    <h3>💎 Top Memes (By Volume)</h3>
                </div>
                <div class="list-container" id="top-memes-list">
                    <!-- Dynamic content will be injected here -->
                    <div style="text-align: center; padding: 40px; opacity: 0.6;">Loading memes...</div>
                </div>
            </div>
        </div>
    </main>



    <script type="module" src="script.js"></script>
</body>
</html>
